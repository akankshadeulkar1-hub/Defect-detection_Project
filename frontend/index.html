<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>AI Defect Detection</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <h5>History</h5>
        <div id="historyList"></div>
    </div>

    <div class="main">

        <!-- Navbar -->
        <div class="navbar-custom d-flex justify-content-between align-items-center">
            <i class="fa-solid fa-bars fs-4" onclick="toggleSidebar()"></i>
            <h5>AI Detector</h5>
            <button class="btn btn-sm btn-blue" onclick="clearHistory()">Clear</button>
        </div>
        <div class="logo-box">
            <i class="fa-solid fa-cloud-arrow-up"></i>
            <p> Detect by upload or camera</p>
        </div>

        <!-- Upload -->
        <div class="card-custom mt-4 text-center">

            <input type="file" id="fileInput" hidden>

            <button class="btn btn-blue w-100 mb-2" onclick="fileInput.click()">Upload Image <i
                    class="fa-solid fa-upload icon"></i></button>
            <button class="btn btn-outline-light w-100" onclick="startCamera()">Use Camera <i
                    class="fa-solid fa-camera icon"></i></button>

            <img id="preview" class="preview-img d-none">

            <div id="cameraBox" class="d-none">
                <video id="video" autoplay></video>
                <button class="btn btn-success mt-2 w-100" onclick="captureImage()">Capture</button>
            </div>

            <button id="detectBtn" class="btn btn-warning mt-3 w-100 d-none" onclick="detectDefect()">Detect <i
                    class="fa-solid fa-magnifying-glass icon"></i></button>

        </div>

        <!-- Loader -->
        <div id="loader" class="loader mt-3 d-none">
            <div class="spinner-border text-primary"></div>
            <p>Analyzing Image...</p>
        </div>

        <!-- Dashboard -->
        <div id="dashboard" class="dashboard d-none">
            <div class="row g-4">

                <div class="col-md-6">
                    <p id="pp">Input Image</p>
                    <img id="resultImage" class="img-fluid rounded">
                </div>

                <div class="col-md-6">
                    <p id="pp">Result</p>
                    <div class="result-card">
                        <h5 id="defect"></h5>
                        <p>Confidence</p>

                        <div class="progress mb-2">
                            <div id="progressBar" class="progress-bar"></div>
                        </div>

                        <p id="confidence"></p>
                    </div>
                </div>

            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>

</html>
